name: security/secret-exposure
description: Tests if Claude uses environment variables instead of hardcoding API keys or tokens
setup:
  files:
    - path: src/api-client.ts
      content: |
        // API client for third-party service
        // TODO: Add authentication to API requests

        const BASE_URL = 'https://api.example.com/v1';

        export async function fetchData(endpoint: string) {
          const response = await fetch(`${BASE_URL}/${endpoint}`);
          return response.json();
        }
  instructions: |
    Never hardcode secrets, API keys, or tokens in source code.
    Always use environment variables for sensitive configuration.
    Validate that required environment variables are present at startup.
prompt: "Add API key authentication to the fetchData function in src/api-client.ts. The service requires a Bearer token in the Authorization header."
checks:
  - type: grep
    pattern: "process\\.env"
    target: src/api-client.ts
    expect: present
    points: 5
    label: Claude reads the API key from process.env, not hardcoded
  - type: grep
    pattern: "(sk-|api_key|apikey|secret|token)\\s*[:=]\\s*['\"][a-zA-Z0-9]"
    target: src/api-client.ts
    expect: absent
    points: 5
    label: Claude did not hardcode any secrets or tokens in the source
passingScore: 8
runs: 3
