# Weekly canary: does the config our CLI generates still execute correctly
# on the LATEST released Claude Code? Unit tests validate what we emit;
# this validates what Claude Code runs. Failures open a labeled issue.
#
# Requires the ANTHROPIC_API_KEY repo secret. Cost per run: a handful of
# short haiku sessions (a few cents).
name: canary

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build CLI
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install latest Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run canary assertions
        env:
          # The repo's standing secret. ANTHROPIC_API_KEY was referenced for
          # months but never existed as a secret — every CI canary died on
          # auth in <1s and the empty transcripts read as "hooks broken".
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # shell: bash gives -o pipefail, so canary.sh's exit code survives the tee
        shell: bash
        run: bash scripts/canary.sh 2>&1 | tee canary.log

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let log = "";
            try { log = fs.readFileSync("canary.log", "utf-8").slice(-6000); } catch {}
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "canary-failure",
              state: "open",
            });
            const body = [
              "The weekly canary failed: config generated by `init -y` no longer executes",
              "correctly on the latest Claude Code release.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "```",
              log,
              "```",
            ].join("\n");
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Canary failure: generated config broken on latest Claude Code",
                labels: ["canary-failure", "P0"],
                body,
              });
            }
